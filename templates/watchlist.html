{% extends "base.html" %}
{% block title %}Watchlist Saya — SAKURA.ID{% endblock %}

{% block content %}
<div class="page-wrap">

  <div class="section-header" style="padding:0; margin-bottom:1.5rem">
    <h1 class="section-title" style="font-size:1.5rem">
      Watchlist Saya
    </h1>
    <button onclick="clearWatchlist()" style="
      font-family:var(--font-body); font-size:0.8rem;
      color:var(--text3); cursor:pointer; padding:0.4rem 0.8rem;
      border:1px solid var(--border); border-radius:var(--radius);
      background:transparent; transition:all 0.2s;"
      onmouseover="this.style.color='var(--sakura)';this.style.borderColor='var(--sakura)'"
      onmouseout="this.style.color='var(--text3)';this.style.borderColor='var(--border)'">
      Hapus Semua
    </button>
  </div>

  <div id="watchlistPageContainer">
    <div style="text-align:center;padding:4rem 0;color:var(--text3)">
      <div style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--sakura);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem"></div>
      Memuat...
    </div>
  </div>

  <!-- Riwayat Tonton -->
  <div style="margin-top:3rem">
    <div class="section-header" style="padding:0; margin-bottom:1.5rem">
      <h2 class="section-title" style="font-size:1.25rem">Riwayat Tonton</h2>
      <button onclick="clearAllHistory()" style="
        font-family:var(--font-body); font-size:0.8rem;
        color:var(--text3); cursor:pointer; padding:0.4rem 0.8rem;
        border:1px solid var(--border); border-radius:var(--radius);
        background:transparent; transition:all 0.2s;"
        onmouseover="this.style.color='var(--sakura)';this.style.borderColor='var(--sakura)'"
        onmouseout="this.style.color='var(--text3)';this.style.borderColor='var(--border)'">
        Hapus Semua Riwayat
      </button>
    </div>
    <div id="historyContainer"></div>
  </div>

</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
.history-list { display: flex; flex-direction: column; gap: 0.75rem; }
.history-item {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.75rem 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color 0.2s;
}
.history-item:hover { border-color: var(--sakura); }
.history-item img {
  width: 48px; height: 68px; object-fit: cover;
  border-radius: var(--radius); flex-shrink: 0;
}
.history-info { flex: 1; min-width: 0; }
.history-title {
  font-weight: 700; font-size: 0.9rem; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.history-ep { font-size: 0.78rem; color: var(--sakura); font-weight: 600; margin-top: 0.15rem; }
.history-time { font-size: 0.72rem; color: var(--text3); margin-top: 0.15rem; }
.history-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
</style>

<script>
function clearWatchlist() {
  if (!confirm('Hapus semua watchlist?')) return;
  localStorage.removeItem('sakura_watchlist');
  renderWatchlistPage();
  showToast('🗑️ Watchlist dikosongkan');
}

function clearAllHistory() {
  if (!confirm('Hapus semua riwayat tonton?')) return;
  localStorage.removeItem('sakura_history');
  renderHistoryPage();
  showToast('🗑️ Riwayat dikosongkan');
}

function renderHistoryPage() {
  const container = document.getElementById('historyContainer');
  if (!container) return;
  const history = History.getAll();
  if (!history.length) {
    container.innerHTML = '<p style="color:var(--text3);font-size:0.88rem">Belum ada riwayat tonton.</p>';
    return;
  }
  container.innerHTML = `<div class="history-list">
    ${history.map(h => `
    <div class="history-item" id="h-${h.animeSlug}">
      <a href="/watch/${h.episodeSlug}">
        <img src="${h.animePoster}" alt="${h.animeTitle}" onerror="this.src='/static/img/no-poster.svg'">
      </a>
      <div class="history-info">
        <a href="/anime/${h.animeSlug}" class="history-title">${h.animeTitle}</a>
        <div class="history-ep">${h.episodeName}</div>
        <div class="history-time">${formatTimeAgo(h.watchedAt)}</div>
      </div>
      <div class="history-actions">
        <a href="/watch/${h.episodeSlug}" class="btn-primary" style="padding:0.45rem 1rem;font-size:0.8rem">
          Lanjutkan
        </a>
        <button onclick="removeHistory('${h.animeSlug}')" style="
          padding:0.45rem 0.7rem; border-radius:var(--radius);
          border:1px solid var(--border); background:transparent;
          color:var(--text3); cursor:pointer; font-family:var(--font-body); font-size:0.8rem;
          transition:all 0.2s;"
          onmouseover="this.style.color='var(--sakura)';this.style.borderColor='var(--sakura)'"
          onmouseout="this.style.color='var(--text3)';this.style.borderColor='var(--border)'">
          Hapus
        </button>
      </div>
    </div>`).join('')}
  </div>`;
}

function removeHistory(slug) {
  History.remove(slug);
  document.getElementById(`h-${slug}`)?.remove();
  const list = document.querySelector('.history-list');
  if (list && !list.children.length) renderHistoryPage();
  showToast('🗑️ Dihapus dari riwayat');
}

// Render history setelah features.js load
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(renderHistoryPage, 100);
});
</script>
{% endblock %}
